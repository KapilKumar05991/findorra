version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: findorra_postgres
    environment:
      POSTGRES_USER: findorra
      POSTGRES_PASSWORD: findorra_secret
      POSTGRES_DB: findorra_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: findorra_redis
    ports:
      - "6379:6379"

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: findorra_elastic
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data

volumes:
  postgres_data:
  elastic_data: